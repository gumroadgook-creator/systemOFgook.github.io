<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สั่งอาหาร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Serif+Thai:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E85D04;
  --orange-light: #FFF0E6;
  --orange-mid: #FF8C42;
  --brown: #3D1C02;
  --cream: #FDF6ED;
  --text: #2D1B00;
  --muted: #8B6914;
  --border: #E8D5B0;
  --green: #2D6A4F;
  --green-light: #E8F5EE;
  --red: #C1121F;
  --red-light: #FFE8EA;
  --shadow: 0 2px 12px rgba(61,28,2,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sarabun',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

/* HEADER */
.header {
  background: var(--brown);
  padding: 20px 16px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content:'';
  position:absolute;
  top:-30px; right:-30px;
  width:120px; height:120px;
  background: var(--orange);
  border-radius:50%;
  opacity:0.15;
}
.header h1 {
  font-family:'Noto Serif Thai',serif;
  font-size: 26px;
  color: #FFF;
  letter-spacing:1px;
}
.header .subtitle {
  font-size:13px;
  color: #E8C99A;
  margin-top:4px;
}
.table-badge {
  display:inline-block;
  background: var(--orange);
  color:#fff;
  font-size:13px;
  font-weight:600;
  padding:4px 16px;
  border-radius:20px;
  margin-top:10px;
}

/* SECTION TITLE */
.section-title {
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  padding:20px 16px 10px;
}

/* MENU GRID */
.menu-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  padding:0 14px;
}
.menu-card {
  background:#fff;
  border-radius:14px;
  border:1.5px solid var(--border);
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.menu-card:active { transform:scale(0.97); }
.menu-card.selected { border-color:var(--orange); }

.menu-emoji {
  font-size:36px;
  text-align:center;
  padding:16px 0 8px;
  display:block;
}
.menu-info {
  padding:0 12px 14px;
}
.menu-name {
  font-size:14px;
  font-weight:600;
  color:var(--text);
}
.menu-price {
  font-size:13px;
  color:var(--orange);
  font-weight:700;
  margin-top:2px;
}
.menu-add-btn {
  display:block;
  width:calc(100% - 24px);
  margin:0 12px 12px;
  padding:8px;
  background:var(--orange-light);
  color:var(--orange);
  border:none;
  border-radius:8px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:background 0.15s;
}
.menu-add-btn:hover { background:#FFE0CC; }

/* CART */
.cart-section {
  padding:0 14px;
  margin-bottom:100px;
}
.cart-empty {
  text-align:center;
  padding:30px;
  color:var(--muted);
  font-size:14px;
  background:#fff;
  border-radius:14px;
  border:1.5px dashed var(--border);
}
.cart-item {
  background:#fff;
  border-radius:12px;
  border:1.5px solid var(--border);
  padding:12px 14px;
  margin-bottom:8px;
}
.cart-item-main {
  display:flex;
  align-items:center;
  gap:10px;
}
.cart-item-icon { font-size:24px; }
.cart-item-name {
  flex:1;
  font-size:15px;
  font-weight:600;
}
.cart-item-price {
  font-size:13px;
  color:var(--muted);
  margin-top:1px;
}
.qty-controls {
  display:flex;
  align-items:center;
  gap:8px;
}
.qty-btn {
  width:30px; height:30px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--cream);
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  line-height:1;
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}
.qty-btn.minus { color:var(--red); border-color:var(--red-light); }
.qty-btn.plus { color:var(--green); border-color:var(--green-light); background:var(--green-light); }
.qty-num {
  font-size:16px;
  font-weight:700;
  min-width:20px;
  text-align:center;
}

/* TOTAL BAR */
.total-bar {
  background:var(--brown);
  padding:12px 16px 6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.total-label { color:#E8C99A; font-size:13px; }
.total-amount { color:#fff; font-size:22px; font-weight:700; }

/* ORDER BTN */
.bottom-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  background:#fff;
  border-top:1px solid var(--border);
  padding:10px 16px 20px;
  display:flex;
  flex-direction:column;
  gap:8px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}
.total-preview {
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:var(--muted);
}
.total-preview span:last-child { font-weight:700; color:var(--orange); font-size:16px; }
.order-btn {
  width:100%;
  padding:16px;
  background: var(--orange);
  color:#fff;
  border:none;
  border-radius:14px;
  font-family:'Sarabun',sans-serif;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:background 0.2s, transform 0.1s;
  letter-spacing:0.5px;
}
.order-btn:hover { background:#C94E03; }
.order-btn:active { transform:scale(0.99); }
.order-btn:disabled { background:#ccc; cursor:not-allowed; }

/* TOAST */
.toast {
  position:fixed;
  top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:#1a1a1a;
  color:#fff;
  padding:12px 24px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index:1000;
  white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }

/* NOTE INPUT */
.note-input {
  width:100%;
  padding:10px 12px;
  border:1.5px solid var(--border);
  border-radius:10px;
  font-family:'Sarabun',sans-serif;
  font-size:14px;
  background:var(--cream);
  color:var(--text);
  resize:none;
  margin-top:10px;
}
.note-input:focus { outline:none; border-color:var(--orange); }

/* ITEM COMMENT */
.item-comment-section {
  padding-top:10px;
  border-top:1px solid var(--border);
  margin-top:8px;
}
.comment-chips {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:8px;
}
.comment-chip {
  padding:5px 12px;
  border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--cream);
  font-family:'Sarabun',sans-serif;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.comment-chip.active {
  background:var(--orange);
  border-color:var(--orange);
  color:#fff;
}
.item-comment-input {
  width:100%;
  padding:8px 10px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  background:var(--cream);
  color:var(--text);
}
.item-comment-input:focus { outline:none; border-color:var(--orange); }
.item-comment-display {
  font-size:12px;
  color:var(--orange);
  margin-top:2px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🍜 ร้านข้าวแสนอร่อย</h1>
  <div class="subtitle">สั่งอาหารง่ายๆ ไม่ต้องรอพนักงาน</div>
  <div class="table-badge" id="tableBadge">โต๊ะ 1</div>
</div>

<div class="section-title">เมนูแนะนำ</div>

<div class="menu-grid" id="menuGrid"></div>

<div class="section-title" style="margin-top:14px;">รายการที่เลือก 🛒</div>
<div class="cart-section" id="cartSection">
  <div class="cart-empty" id="cartEmpty">ยังไม่ได้เลือกเมนู<br>กดเมนูด้านบนเพื่อเพิ่ม</div>
</div>

<div class="bottom-bar">
  <div class="total-preview">
    <span>รวมทั้งหมด</span>
    <span id="totalPreview">฿0</span>
  </div>
  <button class="order-btn" id="orderBtn" onclick="submitOrder()" disabled>
    ส่งออเดอร์
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const TABLE = new URLSearchParams(location.search).get('table') || '1';
document.getElementById('tableBadge').textContent = 'โต๊ะ ' + TABLE;

const MENU = [
  { id:1, name:'ข้าวผัด', price:60, emoji:'🍳' },
  { id:2, name:'กะเพราไก่', price:65, emoji:'🌶️' },
  { id:3, name:'ผัดไทย', price:70, emoji:'🍜' },
  { id:4, name:'ชาเย็น', price:30, emoji:'🧋' },
  { id:5, name:'ต้มยำกุ้ง', price:120, emoji:'🍲' },
  { id:6, name:'ข้าวมันไก่', price:55, emoji:'🍗' },
  { id:7, name:'โอเลี้ยง', price:25, emoji:'☕' },
  { id:8, name:'ข้าวหน้าเป็ด', price:80, emoji:'🦆' },
];

const QUICK_COMMENTS = ['ไม่เผ็ด', 'ไม่ผัก', 'ไม่ใส่ถั่ว', 'เผ็ดน้อย', 'พิเศษ'];

let cart = {};

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = MENU.map(m => `
    <div class="menu-card" id="card-${m.id}">
      <span class="menu-emoji">${m.emoji}</span>
      <div class="menu-info">
        <div class="menu-name">${m.name}</div>
        <div class="menu-price">฿${m.price}</div>
      </div>
      <button class="menu-add-btn" onclick="addItem(${m.id})">+ เพิ่ม</button>
    </div>
  `).join('');
}

function addItem(id) {
  const item = MENU.find(m => m.id === id);
  if (!item) return;
  cart[id] = cart[id] ? {...cart[id], qty: cart[id].qty + 1} : {...item, qty:1, comment:''};
  renderCart();
  showToast('เพิ่ม ' + item.name + ' แล้ว ✓', 'success');
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function renderCart() {
  const sec = document.getElementById('cartSection');
  const items = Object.values(cart);

  if (items.length === 0) {
    sec.innerHTML = '<div class="cart-empty" id="cartEmpty">ยังไม่ได้เลือกเมนู<br>กดเมนูด้านบนเพื่อเพิ่ม</div>';
    document.getElementById('totalPreview').textContent = '฿0';
    document.getElementById('orderBtn').disabled = true;
    return;
  }

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  sec.innerHTML = items.map(i => `
    <div class="cart-item">
      <div class="cart-item-main">
        <span class="cart-item-icon">${i.emoji}</span>
        <div style="flex:1">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-price">฿${i.price} × ${i.qty} = ฿${i.price * i.qty}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn minus" onclick="changeQty(${i.id}, -1)">−</button>
          <span class="qty-num">${i.qty}</span>
          <button class="qty-btn plus" onclick="changeQty(${i.id}, +1)">+</button>
        </div>
      </div>
      <div class="item-comment-section">
        <div class="comment-chips">
          ${QUICK_COMMENTS.map(c => `
            <button type="button" class="comment-chip ${i.comment === c ? 'active' : ''}" onclick="toggleQuickComment(${i.id}, '${c}')">${c}</button>
          `).join('')}
        </div>
        <input
          type="text"
          class="item-comment-input"
          placeholder="คอมเมนต์เพิ่มเติม เช่น ไม่ใส่หอม..."
          value="${(QUICK_COMMENTS.includes(i.comment) ? '' : (i.comment || '')).replace(/"/g,'&quot;')}"
          oninput="setCustomComment(${i.id}, this.value)"
        >
      </div>
    </div>
  `).join('') + `
    <textarea class="note-input" id="noteInput" rows="2" placeholder="หมายเหตุรวมทั้งออเดอร์ เช่น ขอช้อนเพิ่ม..."></textarea>
  `;

  document.getElementById('totalPreview').textContent = '฿' + total;
  document.getElementById('orderBtn').disabled = false;
}

function toggleQuickComment(id, comment) {
  if (!cart[id]) return;
  cart[id].comment = (cart[id].comment === comment) ? '' : comment;
  renderCart();
}

function setCustomComment(id, value) {
  if (!cart[id]) return;
  cart[id].comment = value;
}

async function submitOrder() {
  const items = Object.values(cart).map(i => ({ name: i.name, qty: i.qty, price: i.price, comment: i.comment || '' }));
  if (!items.length) return;
  
  const note = document.getElementById('noteInput')?.value || '';
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง...';
  
  try {
    const res = await fetch('/order', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table: parseInt(TABLE), items, note })
    });
    const data = await res.json();
    if (data.success) {
      cart = {};
      renderCart();
      btn.textContent = '✓ ส่งออเดอร์แล้ว!';
      btn.style.background = '#2D6A4F';
      showToast(`ส่งออเดอร์ #${data.order_id} แล้ว 🎉`, 'success');
      setTimeout(() => {
        btn.textContent = 'ส่งออเดอร์';
        btn.style.background = '';
      }, 3000);
    }
  } catch(e) {
    showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ 😢', 'error');
    btn.disabled = false;
    btn.textContent = 'ส่งออเดอร์';
  }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderMenu();
</script>
</body>
</html>
